<head>

        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/bootstrap.min.css">

    <script>
        document.documentElement.classList.add('dynamic-portfolio-pending');

    <style>
        .dynamic-portfolio-pending #myTab,

        .dynamic-portfolio-pending #portfolio-title,
        .dynamic-portfolio-pending #portfolio-description {
            visibility: hidden;
        }

</head>

<body>

    <div class="page-loader" id="page-loader" aria-live="polite" aria-label="Loading content">
        <div class="page-loader__inner">
            <div class="page-loader__spinner"></div>
            <p class="page-loader__text">Loading portfolio...</p>

    <div id="carouselExample" class="carousel slide">
        <div class="carousel-inner">

            <div class="carousel-item">

        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">

        <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">

    </div>
    <section class="portfolio">


        <div class="container text-center">
            <div class="row">

                <div class="img-container">
                    <a href="https://designspartans.com/" target="_blank"> <img
                            src="./images/Logos/Design Spartans Logo.png" alt="Design Spartans Logo "
                            class="Design-Spartans-logo"></a>
                </div>

                <div class="col-lg-10 offset-lg-1">
                    <h2 class="title-bg" id="portfolio-title"
                        style="background-image: url('images/title-bg.svg'); margin-top: 60px; padding: 12px; ">Our
                        Recent
                        Projects</h2>
                    <p class="p" id="portfolio-description"></p>
                    <br>
                </div>
            </div>
        </div>
    </section>

    <section>
        <ul class="nav nav-tabs" id="myTab" role="tablist"></ul>
        <div class="tab-content" id="myTabContent"></div>
    </section>

    <!-- Modal ==============================-->
    <div class="modal" id="modalShow" tabindex="-1" aria-labelledby="modal56" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <img src="./images/Delivered Products/The%20Handyman%20Sticker%20_2-02_28_11zon.webp"
                        class="img-fluid" alt="Delivered Product Preview">
                </div>
            </div>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
        import {
            getFirestore,
            doc,
            getDoc,
            collection,
            getDocs,
            query,
            orderBy
        } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC8ixThMuTncx0LWw4kVFtJ4nOeTmq2iGc",
            authDomain: "designspartans-portfolio.firebaseapp.com",
            projectId: "designspartans-portfolio",
            storageBucket: "designspartans-portfolio.firebasestorage.app",
            messagingSenderId: "601370060723",
            appId: "1:601370060723:web:c3950c2abe2de4ae3b8dc6"
        };

        const WEB_DESIGN_NAME = "Web Design";
        const DELIVERED_PRODUCTS_NAME = "Delivered Products";
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.changeTab = function (tabPaneId) {
            const triggerButton = document.querySelector(`[data-bs-target="#${tabPaneId}"]`);

            if (!triggerButton || !window.bootstrap?.Tab) {
                return;
            }

            window.bootstrap.Tab.getOrCreateInstance(triggerButton).show();
        };

        function escapeHtml(value = "") {
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function slugify(value = "") {
            return String(value)
                .toLowerCase()
                .replace(/&/g, " and ")
                .replace(/[^a-z0-9]+/g, "-")
                .replace(/^-+|-+$/g, "");
        }

        function sanitizeUrl(value = "#") {
            if (!value) {
                return "#";
            }

            const trimmedValue = String(value).trim();

            if (
                trimmedValue.startsWith("http://") ||
                trimmedValue.startsWith("https://") ||
                trimmedValue.startsWith("data:image/")
            ) {
                return trimmedValue;
            }

            return trimmedValue.startsWith("./") || trimmedValue.startsWith("/") ? trimmedValue : `https://${trimmedValue}`;
        }

        function normalizeTimestamp(value) {
            if (!value) {
                return 0;
            }

            if (typeof value.toMillis === "function") {
                return value.toMillis();
            }

            if (value.seconds) {
                return value.seconds * 1000;
            }

            return 0;
        }

        function sortByCreatedAt(items) {
            return [...items].sort((a, b) => normalizeTimestamp(a.createdAt) - normalizeTimestamp(b.createdAt));
        }

        function getTabButtonId(categoryId) {
            return `tab-${categoryId}-button`;
        }

        function getTabPaneId(categoryId) {
            return `tab-${categoryId}-pane`;
        }

        function createWebCard(project) {
            const imageUrl = sanitizeUrl(project.imageUrl);
            const title = escapeHtml(project.title || project.name || "Untitled Project");
            const rawLink = String(project.link || "").trim();
            const hasLink = Boolean(rawLink);
            const linkUrl = hasLink ? sanitizeUrl(rawLink) : "";
            const imageMarkup = `<img src="${imageUrl}" class="card-img img-fluid" alt="${title}">`;
            const titleMarkup = `<h4 class="card-title">${title}</h4>`;

            return `
                <div class="col-md-4 col-lg-4 col-sm-6 web-box">
                    <div class="box">
                        ${hasLink
                    ? `<a href="${linkUrl}" target="_blank" rel="noopener noreferrer">${imageMarkup}</a>`
                    : imageMarkup}
                        <div class="card-body">
                            ${hasLink
                    ? `<a href="${linkUrl}" style="text-decoration: none;" target="_blank" rel="noopener noreferrer">${titleMarkup}</a>`
                    : titleMarkup}
                        </div>
                    </div>
                </div>
            `;
        }

        function createRows(cards, perRow = 3) {
            const rows = [];

            for (let i = 0; i < cards.length; i += perRow) {
                rows.push(`<div class="row">${cards.slice(i, i + perRow).join("")}</div>`);
            }

            return rows.join("");
        }

        function renderTopContent(primaryContent) {
            const titleElement = document.getElementById("portfolio-title");
            const descriptionElement = document.getElementById("portfolio-description");

            if (!titleElement || !descriptionElement) {
                return;
            }

            if (!primaryContent) {
                descriptionElement.textContent = "No data found.";
                return;
            }

            if (primaryContent.title) {
                titleElement.textContent = primaryContent.title;
            }

            descriptionElement.textContent = primaryContent.content || "No data found.";
        }

        function renderNoDataState(tabPaneId, title = "No data found") {
            const tabPane = document.getElementById(tabPaneId);

            if (!tabPane) {
                return;
            }

            tabPane.innerHTML = `
                <div class="container text-center py-5">
                    <div class="row justify-content-center">
                        <div class="col-lg-8">
                            <h2 class="title-bg" style="background-image: url('images/title-bg.svg');">${escapeHtml(title)}</h2>
                            <p class="p mb-0">No data available for this section right now.</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderDropdownNoData(dropdownId) {
            const dropdown = document.getElementById(dropdownId);

            if (!dropdown) {
                return;
            }

            dropdown.innerHTML = `
                <div class="row">
                    <div class="col">
                        <li><span class="dropdown-item">No data found</span></li>
                    </div>
                </div>
            `;
        }

        function renderTabs(mainCategories) {
            const tabList = document.getElementById("myTab");
            const tabContent = document.getElementById("myTabContent");

            if (!tabList || !tabContent) {
                return;
            }

            tabList.innerHTML = mainCategories.map((category, index) => {
                const buttonId = getTabButtonId(category.id);
                const paneId = getTabPaneId(category.id);
                const isActive = index === 0;
                const isWebDesign = category.name === WEB_DESIGN_NAME;

                if (isWebDesign) {
                    return `
                        <li class="nav-item btn-group" role="presentation">
                            <button type="button" class="nav-link dynamic-web-tab ${isActive ? "active" : ""}" id="${buttonId}" data-category-name="${escapeHtml(category.name)}"
                                data-bs-toggle="tab" data-bs-target="#${paneId}" role="tab" aria-controls="${paneId}" aria-selected="${isActive}">
                                ${escapeHtml(category.name)}
                            </button>
                            <button type="button" class="btn btn-danger dropdown-toggle dropdown-toggle-split"
                                data-bs-toggle="dropdown" aria-expanded="false"></button>
                            <ul class="dropdown-menu dropdown-menu-lg" id="dropdown-${category.id}"></ul>
                        </li>
                    `;
                }

                return `
                    <li class="nav-item btn-group" role="presentation">
                        <button class="nav-link ${isActive ? "active" : ""}" id="${buttonId}" data-bs-toggle="tab"
                            data-bs-target="#${paneId}" type="button" role="tab" aria-controls="${paneId}" aria-selected="${isActive}">
                            ${escapeHtml(category.name)}
                        </button>
                    </li>
                `;
            }).join("");

            tabContent.innerHTML = mainCategories.map((category, index) => {
                const paneId = getTabPaneId(category.id);
                const buttonId = getTabButtonId(category.id);
                const isActive = index === 0;

                if (category.name === DELIVERED_PRODUCTS_NAME) {
                    return `
                        <div class="tab-pane ${isActive ? "show active" : ""}" id="${paneId}" role="tabpanel" aria-labelledby="${buttonId}" tabindex="0">
                            <ul class="grid effect-1" id="grid-${category.id}"></ul>
                        </div>
                    `;
                }

                return `
                    <div class="tab-pane ${isActive ? "show active" : ""}" id="${paneId}" role="tabpanel" aria-labelledby="${buttonId}" tabindex="0"></div>
                `;
            }).join("");
        }

        function initializeDynamicPlaceholders(mainCategories) {
            renderTabs(mainCategories);
            mainCategories.forEach((category) => {
                const paneId = getTabPaneId(category.id);
                renderNoDataState(paneId, category.name);

                if (category.name === WEB_DESIGN_NAME) {
                    renderDropdownNoData(`dropdown-${category.id}`);
                }
            });
        }

        function renderWebDesignDropdown(dropdownId, tabPaneId, subCategories) {
            const dropdown = document.getElementById(dropdownId);

            if (!dropdown) {
                return;
            }

            const items = subCategories.map((category) => {
                const anchorId = slugify(category.name);
                const name = escapeHtml(String(category.name || "").toUpperCase());

                return `
                    <li>
                        <a class="dropdown-item" href="#${anchorId}" onclick="changeTab('${tabPaneId}')">${name}</a>
                    </li>
                `;
            });

            const columns = [];

            for (let i = 0; i < items.length; i += 4) {
                columns.push(`<div class="col">${items.slice(i, i + 4).join("")}</div>`);
            }

            const rows = [];

            for (let i = 0; i < columns.length; i += 4) {
                rows.push(`<div class="row">${columns.slice(i, i + 4).join("")}</div>`);
            }

            dropdown.innerHTML = rows.join("") || dropdown.innerHTML;
        }

        function renderWebDesignProjects(tabPaneId, subCategories, projects) {
            const tabPane = document.getElementById(tabPaneId);

            if (!tabPane) {
                return;
            }

            const sections = subCategories
                .map((category) => {
                    const relatedProjects = sortByCreatedAt(
                        projects.filter((project) => {
                            const projectSubCategory = project.subCategoryId || project.categoryId;
                            return projectSubCategory === category.id;
                        })
                    );

                    if (!relatedProjects.length) {
                        return "";
                    }

                    const cards = relatedProjects.map(createWebCard);

                    return `
                        <h2 class="title-bg" id="${slugify(category.name)}" style="background-image: url('images/title-bg.svg');">
                            ${escapeHtml(category.name)}
                        </h2>
                        ${createRows(cards)}
                    `;
                })
                .filter(Boolean)
                .join("");

            if (!sections) {
                return;
            }

            tabPane.innerHTML = `
                <div class="container text-center">
                    ${sections}
                </div>
            `;
        }

        function renderGenericProjects(tabPaneId, projects, title) {
            const tabPane = document.getElementById(tabPaneId);

            if (!tabPane) {
                return;
            }

            if (!projects.length) {
                renderNoDataState(tabPaneId);
                return;
            }

            const cards = sortByCreatedAt(projects).map(createWebCard);

            tabPane.innerHTML = `
                <div class="container text-center py-4">
                    <h2 class="title-bg" style="background-image: url('images/title-bg.svg');">${escapeHtml(title)}</h2>
                    ${createRows(cards)}
                </div>
            `;
        }

        function renderDeliveredProducts(gridId, projects) {
            const grid = document.getElementById(gridId);

            if (!grid || !projects.length) {
                return;
            }

            const items = sortByCreatedAt(projects)
                .map((project) => {
                    const imageUrl = sanitizeUrl(project.imageUrl);
                    const title = escapeHtml(project.title || project.name || "Delivered Product");

                    return `
                        <li class="shown">
                            <a href="#" data-bs-toggle="modal" data-bs-target="#modalShow" aria-label="${title}">
                                <img src="${imageUrl}" alt="${title}">
                            </a>
                        </li>
                    `;
                })
                .join("");

            grid.innerHTML = items;

            if (typeof window.gallerySet === "function") {
                window.gallerySet();
            }
        }

        async function fetchCollection(collectionName) {
            const collectionRef = collection(db, collectionName);

            try {
                const snapshot = await getDocs(query(collectionRef, orderBy("createdAt", "asc")));
                return snapshot.docs.map((doc) => ({ id: doc.id, ...doc.data() }));
            } catch (error) {
                const snapshot = await getDocs(collectionRef);
                return snapshot.docs.map((doc) => ({ id: doc.id, ...doc.data() }));
            }
        }

        async function fetchDocument(collectionName, documentId) {
            const documentRef = doc(db, collectionName, documentId);
            const snapshot = await getDoc(documentRef);

            if (!snapshot.exists()) {
                return null;
            }

            return { id: snapshot.id, ...snapshot.data() };
        }

        async function fetchTopContent() {
            const primaryContent = await fetchDocument("topContent", "primary");

            if (primaryContent) {
                return primaryContent;
            }

            const fallbackContent = await fetchCollection("topContent");
            return fallbackContent[0] || null;
        }

        async function loadPortfolioData() {
            try {
                const [categories, projects, media, topContent] = await Promise.all([
                    fetchCollection("categories"),
                    fetchCollection("projects"),
                    fetchCollection("media"),
                    fetchTopContent()
                ]);

                renderTopContent(topContent);

                const mainCategories = categories.filter((category) => !category.parentId);
                const orderedMainCategories = sortByCreatedAt(mainCategories);

                if (!orderedMainCategories.length) {
                    document.getElementById("myTab").innerHTML = "";
                    document.getElementById("myTabContent").innerHTML = `
                        <div class="tab-pane show active">
                            <div class="container text-center py-5">
                                <h2 class="title-bg" style="background-image: url('images/title-bg.svg');">No data found</h2>
                                <p class="p mb-0">No categories available right now.</p>
                            </div>
                        </div>
                    `;
                    return;
                }

                initializeDynamicPlaceholders(orderedMainCategories);

                orderedMainCategories.forEach((category) => {
                    const tabPaneId = getTabPaneId(category.id);
                    const categoryProjects = projects.filter((project) => {
                        return (
                            project.mainCategoryId === category.id ||
                            project.mainCategoryName === category.name
                        );
                    });
                    const categoryMedia = media.filter((item) => {
                        return (
                            item.mainCategoryId === category.id ||
                            item.mainCategoryName === category.name ||
                            item.categoryId === category.id ||
                            item.categoryName === category.name
                        );
                    });

                    if (category.name === WEB_DESIGN_NAME) {
                        const webSubCategories = sortByCreatedAt(
                            categories.filter((item) => item.parentId === category.id)
                        );

                        if (webSubCategories.length && categoryProjects.length) {
                            renderWebDesignDropdown(`dropdown-${category.id}`, tabPaneId, webSubCategories);
                            renderWebDesignProjects(tabPaneId, webSubCategories, categoryProjects);
                        } else {
                            renderDropdownNoData(`dropdown-${category.id}`);
                            renderNoDataState(tabPaneId, category.name);
                        }

                        return;
                    }

                    if (category.name === DELIVERED_PRODUCTS_NAME) {
                        const deliveredItems = categoryProjects.length ? categoryProjects : categoryMedia;

                        if (deliveredItems.length) {
                            renderDeliveredProducts(`grid-${category.id}`, deliveredItems);
                        } else {
                            renderNoDataState(tabPaneId, category.name);
                        }

                        return;
                    }

                    const categoryItems = categoryMedia.length ? categoryMedia : categoryProjects;
                    renderGenericProjects(tabPaneId, categoryItems, category.name);
                });
            } catch (error) {
                console.error("Failed to load portfolio data from Firestore.", error);
            } finally {
                document.documentElement.classList.remove('dynamic-portfolio-pending');
                document.body.classList.add('page-loaded');
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("myTab").innerHTML = "";
            document.getElementById("myTabContent").innerHTML = "";
        });

        loadPortfolioData();
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/modernizr/2.8.3/modernizr.min.js"></script>
    <script src="./js/dropdown.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/masonry/4.2.2/masonry.pkgd.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="./js/bootstrap.bundle.min.js"></script>
    <script src="./gallery-assets/masonry.pkgd.min.js"></script>
    <script src="./gallery-assets/imagesloaded.js"></script>
    <script src="./gallery-assets/classie.js"></script>
    <script src="./gallery-assets/AnimOnScroll.js"></script>

    <script>
        function getActiveGrid() {
            return document.querySelector('.tab-pane.active .grid') || document.querySelector('.grid');
        }

        function gallerySet(gridElement = getActiveGrid()) {
            if (!gridElement) {
                return;
            }

            new AnimOnScroll(gridElement, {
                minDuration: 0.4,
                maxDuration: 0.7,
                viewportFactor: 0.2
            });
        }

        $(document).ready(function () {
            $('a').on('click', function () {
                var src = $('img', this).attr('src');
                var modalattr = $(this).attr('data-bs-target');
                if (modalattr === '#modalShow') {
                    $('#modalShow .modal-body img').attr('src', src);
                }

            })

            $(document).on('click', '.dynamic-web-tab.active', function (e) {

                e.stopPropagation();

                $('.dropdown-toggle').dropdown('toggle');

            });
        })



    </script>
</body>

</html>
